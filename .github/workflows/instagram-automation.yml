name: Instagram automation worker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: instagram-automation-worker
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Process due Instagram events and retries
        env:
          CRON_SECRET: ${{ secrets.INSTAGRAM_CRON_SECRET }}
        run: |
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            --retry 2 \
            --retry-all-errors \
            --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://deonmenezes.com/api/instagram/process
